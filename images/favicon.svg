<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" aria-label="Skull with sunglasses and stick of butter">
  <!-- skull (light) -->
  <path fill="#EDE8DF" d="M32 6c-12.7 0-23 10.3-23 23 0 8.4 4.6 15.8 11.3 19.7V55c0 2.2 1.8 4 4 4h3v-7h4v7h4v-7h4v7h3c2.2 0 4-1.8 4-4v-6.3C50.4 44.8 55 37.4 55 29 55 16.3 44.7 6 32 6z"/>

  <!-- nose cavity -->
  <path fill="#000000" d="M29.3 35.0c0-3.9 2.6-7.6 5.7-7.6s5.7 3.7 5.7 7.6c0 3.1-2.4 6.0-5.7 6.0s-5.7-2.9-5.7-6.0z"/>
  <path fill="#000" opacity=".18" d="M33.2 29.0c.9-.6 1.8-.9 2.7-.9 2.1 0 3.8 1.7 4.5 4.0-2.5-.5-4.8 0-7.1 1.5-.2-1.8-.2-3.3-.1-4.6z"/>

  <!-- sunglasses -->
  <g>
    <circle cx="23.5" cy="28.8" r="7.6" fill="#101010"/>
    <circle cx="40.5" cy="28.8" r="7.6" fill="#101010"/>

    <circle cx="23.5" cy="28.8" r="8.7" fill="none" stroke="#2A2A2A" stroke-width="2.4"/>
    <circle cx="40.5" cy="28.8" r="8.7" fill="none" stroke="#2A2A2A" stroke-width="2.4"/>

    <path d="M31.4 28.9h1.2" stroke="#2A2A2A" stroke-width="2.4" stroke-linecap="round"/>

    <path d="M19.8 26.6c1.5-1.9 3.3-2.9 5.3-3.1" stroke="#fff" stroke-width="1.2" opacity=".22" stroke-linecap="round"/>
    <path d="M36.8 26.6c1.5-1.9 3.3-2.9 5.3-3.1" stroke="#fff" stroke-width="1.2" opacity=".22" stroke-linecap="round"/>
  </g>

  <!-- teeth hint -->
  <g opacity=".26" fill="#111">
    <rect x="24" y="44" width="16" height="6" rx="2"/>
    <rect x="27" y="44" width="2" height="6"/>
    <rect x="31" y="44" width="2" height="6"/>
    <rect x="35" y="44" width="2" height="6"/>
  </g>

  <!-- butter stick with label -->
  <g transform="rotate(-12 20 48)">
    <!-- wrapper ends -->
    <path d="M6.6 48.2l2.6-2.2v4.4z" fill="#F7F4EF" stroke="#1A1A1A" stroke-width="1.2" stroke-linejoin="round"/>
    <path d="M30.8 46l2.6 2.2-2.6 2.2z" fill="#F7F4EF" stroke="#1A1A1A" stroke-width="1.2" stroke-linejoin="round"/>

    <!-- wrapper/body -->
    <rect x="8.6" y="45.9" width="22.6" height="4.6" rx="1.5" fill="#F7F4EF" stroke="#1A1A1A" stroke-width="1.5"/>

    <!-- butter peeking through wrapper -->
    <rect x="24.8" y="46.2" width="5.5" height="4" rx="1" fill="#F2D96B" opacity=".95"/>

    <!-- label -->
    <text x="19.7" y="49.15"
          font-family="Arial, Helvetica, sans-serif"
          font-size="3.1"
          font-weight="700"
          text-anchor="middle"
          fill="#1A1A1A"
          letter-spacing=".2">BUTTER</text>
  </g>
</svg>